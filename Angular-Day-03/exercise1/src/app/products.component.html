<h2>Product List</h2>

<table>
  <thead>
    <tr>
      <th>Product ID</th>
      <th>Product Name</th>
      <th>Price</th>
      <th>Manufacturing Date</th>
      <th>Expiry Date</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let product of products">
      <td>{{ product.productId }}</td>
      <td>{{ product.productName | uppercase }}</td>
      <td>{{ product.price | currency : 'INR' : 'symbol' : '1.0-0' }}</td>
      <td>{{ product.mfgDate | date : 'mediumDate' }}</td>
      <td>{{ product.expDate | date : 'fullDate' }}</td>
    </tr>
  </tbody>
</table>
